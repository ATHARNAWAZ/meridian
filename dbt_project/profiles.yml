meridian:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('MERIDIAN_DUCKDB_PATH', '../duckdb_layer/meridian.duckdb') }}"
      extensions:
        - httpfs
        - iceberg
      settings:
        s3_endpoint: "{{ env_var('MINIO_ENDPOINT', 'http://localhost:9000') }}"
        s3_access_key_id: "{{ env_var('MINIO_ACCESS_KEY', 'minioadmin') }}"
        s3_secret_access_key: "{{ env_var('MINIO_SECRET_KEY', 'minioadmin') }}"
        s3_url_style: path
        s3_use_ssl: false
